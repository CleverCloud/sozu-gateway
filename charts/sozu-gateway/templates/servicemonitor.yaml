{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
# Prometheus Operator scrape config for the controller's /metrics endpoint.
# Requires the monitoring.coreos.com CRDs (kube-prometheus-stack &co).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "sozu-gateway.fullname" . }}
  labels:
    {{- include "sozu-gateway.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "sozu-gateway.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
{{- end }}
